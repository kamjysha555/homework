<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>форма-анкета</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<form>
			<fieldset>
				<legend class="nz">Ваши личные данные</legend>
				<label class="form">
					Ваше имя
					<input
						class="form"
						type="text"
						placeholder="Имя"
						name="name"
						required
					/>
				</label>
				<label class="form">
					Ваш возраст
					<input
						class="form"
						type="number"
						inputmode="numeric"
						placeholder="Возраст"
						name="age"
						required
					/>
				</label>
				<label class="form">
					Ваш номер телефона
					<input
						class="form"
						type="tel"
						inputmode="tel"
						placeholder="Номер телефона"
						name="phone"
						required
					/>
				</label>
				<label class="form">
					Ваша почта
					<input
						class="form"
						type="email"
						inputmode="email"
						placeholder="Почта"
						name="email"
						required
					/>
				</label>
				<label class="form">
					Сообщение
					<textarea
						class="form"
						placeholder="Сообщение"
						name="message"
						required
					></textarea>
				</label>
				<label class="form">
					<input type="checkbox" required />
					Я принимаю правила
				</label>
				<button class="form" type="submit">отправить</button>
			</fieldset>
		</form>
	</body>
</html>
